name: OGStarTracker Build CI

on:
  workflow_run:
    workflows: ["Formatting Check"]
    types:
      - completed
    branches:
      - main
      - beta
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO Core
        run: pip install --upgrade platformio esptool

      - name: Build OGStarTracker
        run: pio run --project-dir esp32_wireless_control/firmware -e ogstartracker_release

      - name: Bundle OGStarTracker Combined Binary
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          cd esp32_wireless_control/firmware/.pio/build/ogstartracker_release
          produced_bin=$(ls ogstartracker_*.bin | head -n1)
          cp "$produced_bin" ogstartracker_${COMMIT_SHA}.bin
          python -m esptool --chip esp32 merge-bin \
            -o ogstartracker_${COMMIT_SHA}_combined.bin \
            --flash-size 4MB \
            0x1000 bootloader.bin \
            0x8000 partitions.bin \
            0x10000 ogstartracker_${COMMIT_SHA}.bin

      - name: Upload Build Artifact
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: |
            esp32_wireless_control/firmware/.pio/build/ogstartracker_release/ogstartracker_${{ github.sha }}.bin
            esp32_wireless_control/firmware/.pio/build/ogstartracker_release/ogstartracker_${{ github.sha }}_combined.bin
